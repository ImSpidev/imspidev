<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');

      .grid-h { animation: grid-move 4s linear infinite; }
      .grid-v { animation: grid-fade 4s linear infinite; }
      .title   { animation: flicker 6s ease-in-out infinite; }
      .glow    { animation: glow-pulse 3s ease-in-out infinite; }
      .sun     { animation: sun-rise 6s ease-out forwards; }
      .subtitle {
        filter: drop-shadow(0 0 2px rgba(10, 0, 25, 0.95))
                drop-shadow(0 0 6px rgba(10, 0, 25, 0.7));
      }

      @keyframes grid-move {
        from { transform: translateY(0); }
        to   { transform: translateY(22px); }
      }
      @keyframes grid-fade {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 0.9; }
      }
      @keyframes flicker {
        0%,100% { opacity: 1; }
        92%     { opacity: 1; }
        93%     { opacity: 0.6; }
        94%     { opacity: 1; }
        96%     { opacity: 0.7; }
        97%     { opacity: 1; }
      }
      @keyframes glow-pulse {
        0%,100% { filter: drop-shadow(0 0 8px #FF79C6) drop-shadow(0 0 20px #BD93F9); }
        50%     { filter: drop-shadow(0 0 14px #FF79C6) drop-shadow(0 0 36px #FF79C6); }
      }
      @keyframes sun-rise {
        from { transform: translateY(30px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
    </style>

    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0015"/>
      <stop offset="55%"  stop-color="#2d0057"/>
      <stop offset="100%" stop-color="#1a0033"/>
    </linearGradient>

    <!-- Sun gradient -->
    <linearGradient id="sun-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD6F5"/>
      <stop offset="40%"  stop-color="#FF79C6"/>
      <stop offset="100%" stop-color="#BD93F9"/>
    </linearGradient>

    <!-- Grid fade -->
    <linearGradient id="grid-fade-y" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF79C6" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FF79C6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF79C6" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="grid-fade-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#BD93F9" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#BD93F9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BD93F9" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Soft dark strip behind subtitle for readability -->
    <linearGradient id="subtitle-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#12001f" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#12001f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#12001f" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="grid-clip">
      <rect x="0" y="120" width="900" height="100"/>
    </clipPath>

    <clipPath id="sun-clip">
      <rect x="300" y="72" width="300" height="68"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#sky)"/>

  <!-- Sun circle -->
  <g class="sun">
    <circle cx="450" cy="126" r="52" fill="url(#sun-grad)" opacity="0.88"/>
    <rect x="300" y="109" width="300" height="5"  fill="#1a0033" clip-path="url(#sun-clip)"/>
    <rect x="300" y="119" width="300" height="5"  fill="#1a0033" clip-path="url(#sun-clip)"/>
    <rect x="300" y="129" width="300" height="6"  fill="#1a0033" clip-path="url(#sun-clip)"/>
    <rect x="300" y="140" width="300" height="7"  fill="#1a0033" clip-path="url(#sun-clip)"/>
    <rect x="300" y="153" width="300" height="9"  fill="#1a0033" clip-path="url(#sun-clip)"/>
    <rect x="300" y="167" width="300" height="12" fill="#1a0033" clip-path="url(#sun-clip)"/>
  </g>

  <!-- Horizon line -->
  <line x1="0" y1="130" x2="900" y2="130" stroke="#FF79C6" stroke-width="1.5" opacity="0.8"/>

  <!-- Readability strip behind subtitle -->
  <rect x="0" y="136" width="900" height="18" fill="url(#subtitle-bg)"/>

  <!-- LASER GRID -->
  <g clip-path="url(#grid-clip)">
    <g class="grid-h">
      <line x1="0" y1="130" x2="900" y2="130" stroke="url(#grid-fade-y)" stroke-width="1"/>
      <line x1="0" y1="152" x2="900" y2="152" stroke="url(#grid-fade-y)" stroke-width="1"/>
      <line x1="0" y1="168" x2="900" y2="168" stroke="url(#grid-fade-y)" stroke-width="1.2"/>
      <line x1="0" y1="181" x2="900" y2="181" stroke="url(#grid-fade-y)" stroke-width="1.4"/>
      <line x1="0" y1="192" x2="900" y2="192" stroke="url(#grid-fade-y)" stroke-width="1.5"/>
      <line x1="0" y1="202" x2="900" y2="202" stroke="url(#grid-fade-y)" stroke-width="1.8"/>
      <line x1="0" y1="211" x2="900" y2="211" stroke="url(#grid-fade-y)" stroke-width="2"/>
      <line x1="0" y1="219" x2="900" y2="219" stroke="url(#grid-fade-y)" stroke-width="2.2"/>
    </g>

    <g class="grid-v">
      <line x1="450" y1="130" x2="450" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="344" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="556" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="238" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="662" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="132" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="768" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="26"  y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
      <line x1="450" y1="130" x2="874" y2="220" stroke="url(#grid-fade-v)" stroke-width="1"/>
    </g>
  </g>

  <!-- Title text -->
  <g class="glow title">
    <text
      x="450" y="105"
      text-anchor="middle"
      font-family="'Orbitron', monospace"
      font-weight="900"
      font-size="62"
      letter-spacing="12"
      fill="#FFD6F5"
    >SPIDEV</text>
  </g>

  <!-- Subtitle -->
  <text
    x="420" y="150"
    text-anchor="middle"
    font-family="monospace"
    font-size="11"
    letter-spacing="4.2"
    fill="#7DF9FF"
    opacity="0.96"
    class="subtitle"
  > SOFTWARE ENGINEER  ·  FULLSTACK DEVELOPER  ·  TECH ADDICT</text>
</svg>
